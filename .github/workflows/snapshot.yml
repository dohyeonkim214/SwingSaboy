# 매일 유튜브 수집 → 스냅샷(archive.json) 커밋 → (Vercel이 push를 감지해 자동 재배포)
# 필요한 사전 설정: 저장소 Settings → Secrets and variables → Actions 에
#   YOUTUBE_API_KEY 시크릿 등록 (한 번만)
name: Daily archive snapshot

on:
  schedule:
    - cron: '0 18 * * *' # 매일 18:00 UTC = 한국시간 새벽 3시
  workflow_dispatch: # Actions 탭에서 "Run workflow" 버튼으로 수동 실행 가능

permissions:
  contents: write # 스냅샷 커밋을 푸시하기 위해 필요

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24 # server/db.js가 Node 내장 sqlite(node:sqlite)를 사용

      - run: npm ci

      # 빈 DB → 직전 archive.json 시드 → 수집 → 스냅샷 내보내기 → 문서 역동기화
      - run: npm run snapshot
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Commit snapshot + synced docs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/archive.json .claude/docs/features
          git diff --cached --quiet || { git commit -m "chore: daily archive snapshot + docs sync" && git push; }
